name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # `npm install` (not `npm ci`) works around an npm bug where cross-platform
      # optional deps (e.g. @rolldown/binding-linux-x64-gnu) aren't recorded in
      # a lockfile generated on macOS. See npm/cli#4828.
      - run: npm ci
      # npm/cli#4828: lockfile generated on macOS omits top-level entries for
      # these Linux optional deps. Install explicitly without touching lock.
      - run: |
          npm install --no-save --no-audit --no-fund \
            @rolldown/binding-linux-x64-gnu \
            @parcel/watcher-linux-x64-glibc \
            @next/swc-linux-x64-gnu \
            @rollup/rollup-linux-x64-gnu \
            @tailwindcss/oxide-linux-x64-gnu \
            @unrs/resolver-binding-linux-x64-gnu \
            @img/sharp-linux-x64 \
            @img/sharp-libvips-linux-x64 \
            lightningcss-linux-x64-gnu \
            @esbuild/linux-x64
      - run: npm run lint
      - run: npm run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # npm/cli#4828: lockfile generated on macOS omits top-level entries for
      # these Linux optional deps. Install explicitly without touching lock.
      - run: |
          npm install --no-save --no-audit --no-fund \
            @rolldown/binding-linux-x64-gnu \
            @parcel/watcher-linux-x64-glibc \
            @next/swc-linux-x64-gnu \
            @rollup/rollup-linux-x64-gnu \
            @tailwindcss/oxide-linux-x64-gnu \
            @unrs/resolver-binding-linux-x64-gnu \
            @img/sharp-linux-x64 \
            @img/sharp-libvips-linux-x64 \
            lightningcss-linux-x64-gnu \
            @esbuild/linux-x64
      - name: Load CI env stubs
        run: grep -Ev '^\s*(#|$)' .env.ci >> "$GITHUB_ENV"
      - run: npx vitest run --reporter=verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # npm/cli#4828: lockfile generated on macOS omits top-level entries for
      # these Linux optional deps. Install explicitly without touching lock.
      - run: |
          npm install --no-save --no-audit --no-fund \
            @rolldown/binding-linux-x64-gnu \
            @parcel/watcher-linux-x64-glibc \
            @next/swc-linux-x64-gnu \
            @rollup/rollup-linux-x64-gnu \
            @tailwindcss/oxide-linux-x64-gnu \
            @unrs/resolver-binding-linux-x64-gnu \
            @img/sharp-linux-x64 \
            @img/sharp-libvips-linux-x64 \
            lightningcss-linux-x64-gnu \
            @esbuild/linux-x64
      - name: Load CI env stubs
        run: grep -Ev '^\s*(#|$)' .env.ci >> "$GITHUB_ENV"
      - run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # npm/cli#4828: lockfile generated on macOS omits top-level entries for
      # these Linux optional deps. Install explicitly without touching lock.
      - run: |
          npm install --no-save --no-audit --no-fund \
            @rolldown/binding-linux-x64-gnu \
            @parcel/watcher-linux-x64-glibc \
            @next/swc-linux-x64-gnu \
            @rollup/rollup-linux-x64-gnu \
            @tailwindcss/oxide-linux-x64-gnu \
            @unrs/resolver-binding-linux-x64-gnu \
            @img/sharp-linux-x64 \
            @img/sharp-libvips-linux-x64 \
            lightningcss-linux-x64-gnu \
            @esbuild/linux-x64
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Load CI env stubs
        run: grep -Ev '^\s*(#|$)' .env.ci >> "$GITHUB_ENV"
      - name: Build application
        run: npm run build
      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
